  <!-- Casa — techo -->
  <polygon points="24,13 33,21 15,21" fill="white" opacity="0.95"/>
  <!-- Casa — cuerpo -->
  <rect x="16.5" y="21" width="15" height="12" rx="1" fill="white" opacity="0.9"/>
  <!-- Puerta -->
  <rect x="21" y="27" width="6" height="6" rx="1.5" fill="#0F6E56"/>
  <!-- Ventana izquierda -->
  <rect x="18" y="23" width="3" height="3" rx="0.7" fill="#0F6E56" opacity="0.8"/>
  <!-- Ventana derecha -->
  <rect x="27" y="23" width="3" height="3" rx="0.7" fill="#0F6E56" opacity="0.8"/>
  <!-- Chimenea -->
  <rect x="28" y="13" width="3" height="6" rx="0.7" fill="white" opacity="0.85"/>

  <!-- Punto antena -->
  <circle cx="24" cy="4"  r="2.2" fill="#EF9F27"/>
  <circle cx="24" cy="4"  r="4.2" fill="none" stroke="#EF9F27" stroke-width="0.9" opacity="0.4"/>

  <!-- Ondas izquierda -->
  <path d="M12 12 Q10.5 8  13.5 5.5" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M10.5 13.5 Q8.5 7.5 14 4" fill="none" stroke="#EF9F27" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>

  <!-- Ondas derecha -->
  <path d="M36 12 Q37.5 8  34.5 5.5" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M37.5 13.5 Q39.5 7.5 34 4" fill="none" stroke="#EF9F27" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>


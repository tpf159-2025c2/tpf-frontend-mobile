<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="sg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5DCAA5"/>
      <stop offset="100%" stop-color="#085041"/>
    </radialGradient>
  </defs>

  <!-- Fondo redondeado oscuro -->
  <rect width="48" height="48" rx="10" fill="#111827"/>

  <!-- Escudo -->
  <path d="M24 5 L38 10 L38 27 Q38 39 24 44 Q10 39 10 27 L10 10 Z"
